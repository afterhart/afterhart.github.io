  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
    <button class="lightbox-prev" aria-label="Previous image">&lsaquo;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
    </div>
    <button class="lightbox-next" aria-label="Next image">&rsaquo;</button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

<script>
(function () {
  const links = Array.from(document.querySelectorAll('.nav a[data-page]'));
  const setActive = (page) => {
    links.forEach(a => {
      const isActive = a.dataset.page === page;
      a.classList.toggle('active', isActive);
      if (isActive) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  };

  const mapPathToPage = (p) => {
    if (!p || p === '/' || p === '/index.html') return 'main';
    const name = p.split('/').pop().toLowerCase();
    if (name === 'index.html' || name === '') return 'main';
    return name.replace('.html', '');
  };
  setActive(mapPathToPage(window.location.pathname));

  const hero = document.querySelector('.hero');
  const grid = document.querySelector('.grid');
  if (!hero || !grid) return;

  let gridItems = Array.from(grid.querySelectorAll('.item'));
  let firstRowItems = [];

  // Ждём загрузки всех изображений внутри grid, чтобы расчёты были корректными
  const waitForGridImages = () => {
    const imgs = Array.from(grid.querySelectorAll('img'));
    const promises = imgs.map(img => {
      if (img.complete) return Promise.resolve();
      return new Promise(resolve => {
        img.addEventListener('load', resolve, { once: true });
        img.addEventListener('error', resolve, { once: true });
      });
    });
    return Promise.all(promises);
  };

  const EPS = 3; // допуск в px для сравнения top

  const updateFirstRowItems = () => {
    gridItems = Array.from(grid.querySelectorAll('.item'));
    if (!gridItems.length) { firstRowItems = []; return; }
    const rects = gridItems.map(it => it.getBoundingClientRect());
    const tops = rects.map(r => r.top);
    const minTop = Math.min(...tops);
    firstRowItems = gridItems.filter((it, i) => Math.abs(rects[i].top - minTop) <= EPS);
    // debug
    console.debug('firstRow count=', firstRowItems.length);
  };

  const vh = () => window.innerHeight || document.documentElement.clientHeight;

  const isElementFullyVisible = (el) => {
    const r = el.getBoundingClientRect();
    return r.top >= 0 && r.bottom <= vh();
  };

  const isFirstRowFullyVisible = () => {
    if (!firstRowItems.length) return false;
    const rects = firstRowItems.map(el => el.getBoundingClientRect());
    const top = Math.min(...rects.map(r => r.top));
    const bottom = Math.max(...rects.map(r => r.bottom));
    // debug
    console.debug('firstRow top,bottom,vh=', Math.round(top), Math.round(bottom), vh());
    return top >= 0 && bottom <= vh();
  };

  // Новая: проверяет, видна ли хотя бы часть первой строки
  const isFirstRowAnyVisible = () => {
    if (!firstRowItems.length) return false;
    const rects = firstRowItems.map(el => el.getBoundingClientRect());
    const top = Math.min(...rects.map(r => r.top));
    const bottom = Math.max(...rects.map(r => r.bottom));
    // видима, если есть пересечение с viewport
    return !(bottom <= 0 || top >= vh());
  };

  // Helper: получить первый элемент первой строки (для скролла)
  const getFirstRowFirstElement = () => {
    if (!firstRowItems.length) return null;
    return firstRowItems[0];
  };

  // smooth scroll helpers
  const scrollToTopSmooth = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  const scrollToElementSmooth = (el) => {
    if (!el) return;
    // используем block:'start' чтобы элемент оказался сверху viewport
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // Перехватываем клики по навигации для main, catalog и gallery, чтобы не навигировать на другие страницы,
  // а просто плавно скроллить по текущей странице.
  links.forEach(a => {
    a.addEventListener('click', (ev) => {
      const page = a.dataset.page;
      if (page === 'main') {
        ev.preventDefault();
        setActive('main');
        scrollToTopSmooth();
        // обновим историю (опционально): pushState чтобы адрес остался index.html
        try { history.pushState(null, '', 'index.html'); } catch (e) {}
      } else if (page === 'catalog') {
        ev.preventDefault();
        // пересчитаем первую строку на случай, если DOM изменился
        updateFirstRowItems();
        const first = getFirstRowFirstElement();
        // если есть первый элемент — прокручиваем к нему, иначе к секции .catalog
        const target = first || document.querySelector('.catalog');
        setActive('catalog');
        scrollToElementSmooth(target);
        try { history.pushState(null, '', 'index.html#catalog'); } catch (e) {}
      } else if (page === 'gallery') {
        ev.preventDefault();
        const target = document.querySelector('.gallery');
        setActive('gallery');
        scrollToElementSmooth(target);
        try { history.pushState(null, '', 'index.html#gallery'); } catch (e) {}
      } else {
        // Для остальных ссылок — оставляем нормальную навигацию (если вы хотите тоже скроллить, скажите)
      }
    });
  });

  // Инициализируем: ждём загрузки картинок, затем считаем первую строку и запускаем обработчики
  waitForGridImages().then(() => {
    updateFirstRowItems();
    // начальная проверка
    requestAnimationFrame(() => {
      if (isFirstRowFullyVisible()) setActive('catalog');
      else if (!isFirstRowAnyVisible()) setActive('main');
      else if (isElementFullyVisible(hero)) setActive('main');
    });
  });

  // при ресайзе пересчитываем первую строку (адаптив меняет количество колонок)
  let resizeTimer;
  const onResize = () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      updateFirstRowItems();
      // и сразу проверим состояние
      if (isFirstRowFullyVisible()) setActive('catalog');
      else if (!isFirstRowAnyVisible()) setActive('main');
      else if (isElementFullyVisible(hero)) setActive('main');
    }, 150);
  };
  window.addEventListener('resize', onResize);

  // Throttled scroll handler через rAF
  let ticking = false;
  const onScroll = () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        // Приоритет: если первая строка полностью видна -> Catalog
        if (isFirstRowFullyVisible()) {
          setActive('catalog');
        } else if (!isFirstRowAnyVisible()) {
          // если первая строка совсем не видна (например, смотрим intro2/intro3) -> Main
          setActive('main');
        } else if (isElementFullyVisible(hero)) {
          // иначе, если видно полностью hero -> main
          setActive('main');
        }
        ticking = false;
      });
      ticking = true;
    }
  };
  window.addEventListener('scroll', onScroll, { passive: true });

  // Если динамически добавляете/удаляете элементы, пересчитываем через MutationObserver
  const mo = new MutationObserver(() => {
    // подождём чуть-чуть чтобы DOM произвёл рендер
    setTimeout(() => {
      waitForGridImages().then(updateFirstRowItems);
    }, 60);
  });
  mo.observe(grid, { childList: true, subtree: true });

  // очистка при выходе (опционально)
  // window.addEventListener('beforeunload', () => mo.disconnect());
})();

// Lightbox functionality
(function() {
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxCounter = document.getElementById('lightbox-counter');
  const closeBtn = document.querySelector('.lightbox-close');
  const prevBtn = document.querySelector('.lightbox-prev');
  const nextBtn = document.querySelector('.lightbox-next');
  const galleryItems = Array.from(document.querySelectorAll('.gallery-item img'));
  
  if (!lightbox || !galleryItems.length) {
    if (!lightbox) console.warn('Lightbox element not found');
    if (!galleryItems.length) console.warn('No gallery items found');
    return;
  }

  let currentIndex = 0;

  const showImage = (index) => {
    currentIndex = index;
    const img = galleryItems[index];
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightboxCounter.textContent = `${index + 1} / ${galleryItems.length}`;
    lightbox.classList.add('active');
  };

  const closeLightbox = () => {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  };

  const showNext = () => {
    currentIndex = (currentIndex + 1) % galleryItems.length;
    showImage(currentIndex);
  };

  const showPrev = () => {
    currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
    showImage(currentIndex);
  };

  // Click handlers
  galleryItems.forEach((img, index) => {
    img.parentElement.addEventListener('click', () => showImage(index));
  });

  closeBtn.addEventListener('click', closeLightbox);
  nextBtn.addEventListener('click', showNext);
  prevBtn.addEventListener('click', showPrev);

  // Click outside image to close
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') showNext();
    else if (e.key === 'ArrowLeft') showPrev();
  });
})();
</script>
