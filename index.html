<section class="gallery" aria-label="Gallery">

    <!-- Добавляй новые элементы по тому же шаблону -->

<script>
// nav-scroll.js
// Fresh implementation of navigation active logic + smooth scrolling.
// Rules implemented exactly as requested:
// - MAIN becomes active when intro2/intro3 (hero-pair videos) are >50% visible.
// - MAIN also remains active whenever intro1 (hero) is visible at all (but catalog >50% takes precedence).
// - CATALOG becomes active when >50% of the FIRST row of catalog items is visible.
//   It remains active until the FIRST row of the gallery is fully visible.
// - When scrolling back up, CATALOG becomes active if the LAST row of the catalog is fully visible.
// - GALLERY becomes active when the FIRST row of gallery items is fully visible.
// - Only one nav link is active at a time. Smooth underline/scroll preserved.
// - Nav clicks: main -> top, catalog -> first row of catalog, gallery -> first row of gallery.

(function () {
  'use strict';

  const ROW_EPS = 6; // px tolerance to group items into the same "row"

  // Helper: select nav links with data-page
  const navLinks = Array.from(document.querySelectorAll('.nav a[data-page]'));

  function setActive(page) {
    navLinks.forEach(a => {
      const isActive = a.dataset.page === page;
      a.classList.toggle('active', isActive);
      if (isActive) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  }

  // DOM nodes we will use (may be null)
  const hero = document.querySelector('.hero');                 // intro1
  const heroPair = document.querySelector('.hero-pair');       // container intro2/intro3
  const introElems = heroPair ? Array.from(heroPair.querySelectorAll('.hero-vertical')) : [];
  const catalogGrid = document.querySelector('.catalog .grid') || document.querySelector('.grid');
  const galleryGrid = document.querySelector('.gallery .grid') || document.querySelector('.gallery-grid');

  // viewport helpers
  function rect(el) { return el.getBoundingClientRect(); }
  function vh() { return window.innerHeight || document.documentElement.clientHeight; }

  // visible fraction [0..1] of element within viewport
  function visibleFraction(el) {
    if (!el) return 0;
    const r = rect(el);
    const overlap = Math.max(0, Math.min(r.bottom, vh()) - Math.max(r.top, 0));
    if (r.height <= 0) return 0;
    return Math.min(1, overlap / r.height);
  }

  // Group a set of items into rows by top coordinate (accounts for responsive columns)
  function rowsFromItems(items) {
    if (!items || !items.length) return [];
    const list = items.map(it => ({ el: it, top: Math.round(rect(it).top) }));
    list.sort((a, b) => a.top - b.top);
    const rows = [];
    list.forEach(entry => {
      if (!rows.length) rows.push([entry.el]);
      else {
        const lastTop = Math.round(rect(rows[rows.length - 1][0]).top);
        if (Math.abs(entry.top - lastTop) <= ROW_EPS) rows[rows.length - 1].push(entry.el);
        else rows.push([entry.el]);
      }
    });
    return rows;
  }

  function avgVisible(elements) {
    if (!elements || !elements.length) return 0;
    return elements.reduce((s, el) => s + visibleFraction(el), 0) / elements.length;
  }
  function allFullyVisible(elements) {
    if (!elements || !elements.length) return false;
    return elements.every(el => visibleFraction(el) >= 0.999);
  }

  function getCatalogRows() {
    if (!catalogGrid) return [];
    const items = Array.from(catalogGrid.querySelectorAll('.item'));
    return rowsFromItems(items);
  }
  function getGalleryRows() {
    if (!galleryGrid) return [];
    // gallery might use .gallery-item figures or .item
    const items = Array.from(galleryGrid.querySelectorAll('.gallery-item, .item'));
    return rowsFromItems(items);
  }

  // track scroll direction
  let lastScrollY = window.pageYOffset || 0;

  // Core decision logic (single source of truth)
  function decideActive() {
    const heroFrac = hero ? visibleFraction(hero) : 0;
    const introFracs = introElems.length ? introElems.map(e => visibleFraction(e)) : [];
    const maxIntroFrac = introFracs.length ? Math.max(...introFracs) : 0;

    const catalogRows = getCatalogRows();
    const galleryRows = getGalleryRows();

    const firstCatalogRow = catalogRows.length ? catalogRows[0] : [];
    const lastCatalogRow = catalogRows.length ? catalogRows[catalogRows.length - 1] : [];
    const firstGalleryRow = galleryRows.length ? galleryRows[0] : [];

    const avgFirstCatalog = avgVisible(firstCatalogRow);
    const firstGalleryFully = firstGalleryRow.length ? allFullyVisible(firstGalleryRow) : false;
    const lastCatalogFully = lastCatalogRow.length ? allFullyVisible(lastCatalogRow) : false;

    const currentY = window.pageYOffset || 0;
    const direction = currentY > lastScrollY ? 'down' : (currentY < lastScrollY ? 'up' : 'none');
    lastScrollY = currentY;

    // Apply priority in a deterministic order so only one page is active.

    // 1) MAIN if any intro2/3 is >50% visible
    if (maxIntroFrac > 0.5) {
      setActive('main');
      return;
    }

    // 2) CATALOG if more than half of the FIRST catalog row is visible
    if (firstCatalogRow.length && avgFirstCatalog > 0.5) {
      setActive('catalog');
      return;
    }

    // 3) GALLERY if the FIRST gallery row is fully visible
    //    (catalog should remain active until gallery's first row becomes fully visible)
    if (firstGalleryRow.length && firstGalleryFully) {
      setActive('gallery');
      return;
    }

    // 4) When scrolling up: if the LAST catalog row is fully visible -> CATALOG
    if (direction === 'up' && lastCatalogFully) {
      setActive('catalog');
      return;
    }

    // 5) If hero (intro1) is visible at all -> MAIN
    //    (This is lower priority than catalog >50% to avoid stealing when catalog dominates)
    if (heroFrac > 0) {
      setActive('main');
      return;
    }

    // Fallback: if none of the above match, default to main
    setActive('main');
  }

  // Wait for images inside a container to load (so measurements are accurate)
  function waitForImages(container, timeout = 1000) {
    if (!container) return Promise.resolve();
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length) return Promise.resolve();
    const ps = imgs.map(img => (img.complete ? Promise.resolve() : new Promise(r => {
      img.addEventListener('load', r, { once: true });
      img.addEventListener('error', r, { once: true });
    }))));
    return Promise.race([Promise.all(ps), new Promise(r => setTimeout(r, timeout))]);
  }

  // Scroll target helpers
  function firstElementOfFirstCatalogRow() {
    const rows = getCatalogRows();
    return (rows.length && rows[0].length) ? rows[0][0] : null;
  }
  function firstElementOfFirstGalleryRow() {
    const rows = getGalleryRows();
    return (rows.length && rows[0].length) ? rows[0][0] : null;
  }

  // Smooth scroll helpers (adjust offset if you have fixed header/sidebar)
  const SCROLL_OFFSET = 0; // change if needed (px)
  function scrollToTopSmooth() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToElementSmooth(el) {
    if (!el) return;
    // compute top with offset to accommodate fixed sidebar/header if necessary
    const top = (window.pageYOffset || 0) + el.getBoundingClientRect().top - SCROLL_OFFSET;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  // Bind nav clicks to smooth scroll and prevent navigation
  function bindNavClickHandlers() {
    navLinks.forEach(a => {
      a.addEventListener('click', function (ev) {
        const page = a.dataset.page;
        if (page === 'main') {
          ev.preventDefault();
          setActive('main');
          scrollToTopSmooth();
          try { history.pushState(null, '', 'index.html'); } catch (e) {}
          // re-evaluate after animation
          setTimeout(decideActive, 450);
        } else if (page === 'catalog') {
          ev.preventDefault();
          // slight delay so layout can stabilize (images may lazy-load)
          setTimeout(() => {
            const target = firstElementOfFirstCatalogRow() || document.querySelector('.catalog') || document.querySelector('.grid');
            if (target) {
              setActive('catalog');
              scrollToElementSmooth(target);
              try { history.pushState(null, '', 'index.html#catalog'); } catch (e) {}
              setTimeout(decideActive, 450);
            }
          }, 40);
        } else if (page === 'gallery') {
          ev.preventDefault();
          setTimeout(() => {
            const target = firstElementOfFirstGalleryRow() || document.querySelector('.gallery') || document.querySelector('.gallery-grid');
            if (target) {
              setActive('gallery');
              scrollToElementSmooth(target);
              try { history.pushState(null, '', 'index.html#gallery'); } catch (e) {}
              setTimeout(decideActive, 450);
            }
          }, 40);
        } else {
          // allow default for other navs
        }
      });
    });
  }

  // Initialize: wait for images, then attach handlers and run initial check
  function init() {
    const containers = [catalogGrid, galleryGrid, hero, heroPair].filter(Boolean);
    const waiters = containers.map(c => waitForImages(c));
    Promise.all(waiters).then(() => {
      // initial evaluation (after layout stable)
      requestAnimationFrame(decideActive);
      setTimeout(decideActive, 120);
    });

    // bind nav handlers
    bindNavClickHandlers();

    // scroll handler using rAF for performance
    let rafId = null;
    const onScroll = () => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(decideActive);
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    // recalc after resize (debounced)
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => decideActive(), 160);
    });

    // watch for changes in grid children (in case items are added/removed)
    const observerTarget = catalogGrid || galleryGrid;
    if (observerTarget) {
      const mo = new MutationObserver(() => { setTimeout(decideActive, 80); });
      mo.observe(observerTarget, { childList: true, subtree: true });
    }

    // set initial active based on URL/hash
    (function setInitialFromUrl() {
      const hash = window.location.hash || '';
      if (hash.includes('gallery')) setActive('gallery');
      else if (hash.includes('catalog')) setActive('catalog');
      else setActive('main');
    })();
  }

  // Start
  if (document.readyState === 'complete' || document.readyState === 'interactive') init();
  else window.addEventListener('DOMContentLoaded', init, { once: true });

  // expose for debugging
  window.__navDecideActive = decideActive;
})();
</skript>
</body>
</html>
