  <!-- Row-span helper: computes grid-row span per tile to avoid holes -->
  <script>
  (function () {
    'use strict';

    function toPx(value) {
      if (!value) return 0;
      value = value.trim();
      if (value.endsWith('px')) return parseFloat(value);
      if (value.endsWith('vw')) return (parseFloat(value) / 100) * window.innerWidth;
      if (value.endsWith('vh')) return (parseFloat(value) / 100) * window.innerHeight;
      if (value.endsWith('rem')) {
        const rootSize = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
        return parseFloat(value) * rootSize;
      }
      const n = parseFloat(value);
      return isNaN(n) ? 0 : n;
    }

    function waitForImages(items, timeout = 1200) {
      const imgs = [];
      items.forEach(it => {
        const i = it.querySelectorAll('img');
        i.forEach(x => imgs.push(x));
      });
      if (!imgs.length) return Promise.resolve();
      const promises = imgs.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      });
      return Promise.race([Promise.all(promises), new Promise(res => setTimeout(res, timeout))]);
    }

    function recompute() {
      try {
        const grid = document.querySelector('.gallery-grid');
        if (!grid) return;
        const items = Array.from(grid.querySelectorAll('.gallery-item'));
        if (!items.length) return;

        const cs = getComputedStyle(grid);
        const gridAutoRows = cs.getPropertyValue('grid-auto-rows') || getComputedStyle(document.documentElement).getPropertyValue('--gallery-row') || '8vw';
        const gap = cs.getPropertyValue('gap') || cs.getPropertyValue('grid-row-gap') || getComputedStyle(document.documentElement).getPropertyValue('--gallery-gap') || '6px';
        const rowHeightPx = toPx(gridAutoRows);
        const gapPx = toPx(gap);
        if (rowHeightPx <= 0) return;

        // clear previous inline spans so we measure natural content
        items.forEach(item => {
          item.style.gridRowEnd = '';
          item.style.gridRowStart = '';
        });

        waitForImages(items, 1200).then(() => {
          items.forEach(item => {
            const rect = item.getBoundingClientRect();
            let h = rect.height;
            if (h < 2) {
              const img = item.querySelector('img');
              if (img && img.naturalWidth && img.naturalHeight) {
                const w = item.clientWidth || img.clientWidth || img.naturalWidth;
                h = (img.naturalHeight / img.naturalWidth) * w;
              } else {
                h = rowHeightPx;
              }
            }
            const rowSpan = Math.max(1, Math.ceil((h + gapPx) / (rowHeightPx + gapPx)));
            item.style.gridRowEnd = 'span ' + rowSpan;
            item.style.alignSelf = 'start';
          });
        });

      } catch (e) {
        console.error('gallery-rowspan error', e);
      }
    }

    if (document.readyState === 'complete') recompute();
    else {
      window.addEventListener('load', recompute, { once: true });
      window.addEventListener('DOMContentLoaded', () => setTimeout(recompute, 120), { once: true });
    }

    let rt;
    window.addEventListener('resize', () => {
      clearTimeout(rt);
      rt = setTimeout(recompute, 220);
    });

    // expose for debugging
    window.__galleryRecompute = recompute;
  })();
  </script>
<script src="gallery-rowspan.js"></script>
