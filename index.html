<script>
// nav-scroll-fixed.js
// Fixed navigation highlight + smooth scroll handler.
// - Ensures .nav a.active persists (not only on hover).
// - Prevents default navigation for main/catalog/gallery links and scrolls smoothly.
// - No history.pushState (no unwanted navigation).
// - Decision logic: intro2/3 >50% => main; first catalog row >50% => catalog;
//   first gallery row fully visible => gallery; when scrolling up, last catalog row fully visible => catalog;
//   hero visible => main (lower priority to avoid stealing when catalog dominates).
// - Replace previous nav script with this one.

(function () {
  'use strict';

  const ROW_EPS = 6; // tolerance for grouping items into a row

  // Helper selectors
  function $(sel) { return document.querySelector(sel); }
  function $all(sel) { return Array.from(document.querySelectorAll(sel)); }

  // Nav links with data-page
  const navLinksSelector = '.nav a[data-page]';
  function getNavLinks() { return $all(navLinksSelector); }

  function setActive(page) {
    const links = getNavLinks();
    links.forEach(a => {
      const isActive = a.dataset.page === page;
      if (isActive) {
        a.classList.add('active');
        a.setAttribute('aria-current', 'page');
      } else {
        a.classList.remove('active');
        a.removeAttribute('aria-current');
      }
    });
  }

  // Elements
  const hero = $('.hero'); // intro1
  const heroPair = $('.hero-pair'); // intro2/intro3 container
  const introElems = heroPair ? Array.from(heroPair.querySelectorAll('.hero-vertical')) : [];
  const catalogGrid = $('.catalog .grid') || $('.grid'); // main catalog grid
  const galleryGrid = $('.gallery .grid') || $('.gallery-grid'); // gallery grid (optional)

  // viewport / rect helpers
  function rect(el) { return el.getBoundingClientRect(); }
  function vh() { return window.innerHeight || document.documentElement.clientHeight; }

  // fraction of element visible in viewport (0..1)
  function visibleFraction(el) {
    if (!el) return 0;
    const r = rect(el);
    const overlap = Math.max(0, Math.min(r.bottom, vh()) - Math.max(r.top, 0));
    if (r.height <= 0) return 0;
    return Math.min(1, overlap / r.height);
  }

  // group elements into rows by their top coordinate (responsive columns)
  function rowsFromItems(items) {
    if (!items || !items.length) return [];
    const list = items.map(it => ({ el: it, top: Math.round(rect(it).top) }));
    list.sort((a, b) => a.top - b.top);
    const rows = [];
    list.forEach(entry => {
      if (!rows.length) rows.push([entry.el]);
      else {
        const lastTop = Math.round(rect(rows[rows.length - 1][0]).top);
        if (Math.abs(entry.top - lastTop) <= ROW_EPS) rows[rows.length - 1].push(entry.el);
        else rows.push([entry.el]);
      }
    });
    return rows;
  }

  function avgVisible(elements) {
    if (!elements || !elements.length) return 0;
    return elements.reduce((sum, el) => sum + visibleFraction(el), 0) / elements.length;
  }
  function allFullyVisible(elements) {
    if (!elements || !elements.length) return false;
    return elements.every(el => visibleFraction(el) >= 0.999);
  }

  function getCatalogRows() {
    if (!catalogGrid) return [];
    const items = Array.from(catalogGrid.querySelectorAll('.item'));
    return rowsFromItems(items);
  }
  function getGalleryRows() {
    if (!galleryGrid) return [];
    const items = Array.from(galleryGrid.querySelectorAll('.gallery-item, .item'));
    return rowsFromItems(items);
  }

  // track scroll direction
  let lastScrollY = window.pageYOffset || 0;

  function decideActive() {
    const heroFrac = hero ? visibleFraction(hero) : 0;
    const introFracs = introElems.length ? introElems.map(e => visibleFraction(e)) : [];
    const maxIntroFrac = introFracs.length ? Math.max(...introFracs) : 0;

    const catalogRows = getCatalogRows();
    const galleryRows = getGalleryRows();

    const firstCatalogRow = catalogRows.length ? catalogRows[0] : [];
    const lastCatalogRow = catalogRows.length ? catalogRows[catalogRows.length - 1] : [];
    const firstGalleryRow = galleryRows.length ? galleryRows[0] : [];

    const avgFirstCatalog = avgVisible(firstCatalogRow);
    const firstGalleryFully = firstGalleryRow.length ? allFullyVisible(firstGalleryRow) : false;
    const lastCatalogFully = lastCatalogRow.length ? allFullyVisible(lastCatalogRow) : false;

    const currentY = window.pageYOffset || 0;
    const direction = currentY > lastScrollY ? 'down' : (currentY < lastScrollY ? 'up' : 'none');
    lastScrollY = currentY;

    // Priority order (only one will match)
    // 1) MAIN: intro2/intro3 > 50%
    if (maxIntroFrac > 0.5) {
      setActive('main');
      return;
    }

    // 2) CATALOG: >50% of FIRST catalog row visible
    if (firstCatalogRow.length && avgFirstCatalog > 0.5) {
      setActive('catalog');
      return;
    }

    // 3) GALLERY: FIRST gallery row fully visible => gallery
    if (firstGalleryRow.length && firstGalleryFully) {
      setActive('gallery');
      return;
    }

    // 4) SCROLL UP special case: if last catalog row fully visible => catalog
    if (direction === 'up' && lastCatalogFully) {
      setActive('catalog');
      return;
    }

    // 5) HERO visible at all => MAIN (lower priority than catalog/galleries above)
    if (heroFrac > 0) {
      setActive('main');
      return;
    }

    // fallback
    setActive('main');
  }

  // Wait for images in a container (so measurements are accurate)
  function waitForImages(container, timeout = 1000) {
    if (!container) return Promise.resolve();
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length) return Promise.resolve();
    const promises = imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => {
      img.addEventListener('load', res, { once: true });
      img.addEventListener('error', res, { once: true });
    }));
    return Promise.race([Promise.all(promises), new Promise(res => setTimeout(res, timeout))]);
  }

  // scroll targets
  function firstElementOfFirstCatalogRow() {
    const r = getCatalogRows();
    return (r.length && r[0].length) ? r[0][0] : null;
  }
  function firstElementOfFirstGalleryRow() {
    const r = getGalleryRows();
    return (r.length && r[0].length) ? r[0][0] : null;
  }

  // smooth scroll helpers
  const SCROLL_OFFSET = 0; // set if you need to compensate for fixed header
  function scrollToTopSmooth() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToElementSmooth(el) {
    if (!el) return;
    const top = (window.pageYOffset || 0) + el.getBoundingClientRect().top - SCROLL_OFFSET;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  // bind nav clicks (prevent navigation)
  function bindNavClicks() {
    const links = getNavLinks();
    links.forEach(a => {
      a.addEventListener('click', function (ev) {
        const page = a.dataset.page;
        // prevent default navigation always for these ids
        if (page === 'main' || page === 'catalog' || page === 'gallery') {
          ev.preventDefault();
          ev.stopPropagation && ev.stopPropagation();
        } else {
          // do default for other links
          return;
        }

        if (page === 'main') {
          setActive('main');
          scrollToTopSmooth();
          setTimeout(decideActive, 450);
        } else if (page === 'catalog') {
          setTimeout(() => {
            const target = firstElementOfFirstCatalogRow() || $('.catalog') || $('.grid');
            if (target) {
              setActive('catalog');
              scrollToElementSmooth(target);
              setTimeout(decideActive, 450);
            }
          }, 30);
        } else if (page === 'gallery') {
          setTimeout(() => {
            const target = firstElementOfFirstGalleryRow() || $('.gallery') || $('.gallery-grid');
            if (target) {
              setActive('gallery');
              scrollToElementSmooth(target);
              setTimeout(decideActive, 450);
            }
          }, 30);
        }
      }, { passive: false });
    });
  }

  // initialize
  function init() {
    const containers = [catalogGrid, galleryGrid, hero, heroPair].filter(Boolean);
    const waiters = containers.map(c => waitForImages(c));
    Promise.all(waiters).then(() => {
      requestAnimationFrame(decideActive);
      setTimeout(decideActive, 120);
    });

    bindNavClicks();

    // rAF scroll handler
    let rafId = null;
    const onScroll = () => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(decideActive);
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    // debounced resize
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => decideActive(), 160);
    });

    // mutation observer for grid changes
    const observerTarget = catalogGrid || galleryGrid;
    if (observerTarget) {
      const mo = new MutationObserver(() => { setTimeout(decideActive, 80); });
      mo.observe(observerTarget, { childList: true, subtree: true });
    }

    // initial active from hash if any
    (function setInitial() {
      const hash = window.location.hash || '';
      if (hash.includes('gallery')) setActive('gallery');
      else if (hash.includes('catalog')) setActive('catalog');
      else setActive('main');
    })();
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') init();
  else window.addEventListener('DOMContentLoaded', init, { once: true });

  // exposed for debug
  window.__navDecideActive = decideActive;

})();
</skript>
</body>
