  <script>
/* Smart lazy-loader + fallback for gallery images
   Place this block RIGHT BEFORE the main inline script that initializes the lightbox/nav.
*/
(function () {
  // tiny SVG placeholder (very small, fast)
  const PLACEHOLDER = 'data:image/svg+xml;charset=utf8,<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8"></svg>';

  // concurrency — сколько загрузок одновременно
  const MAX_CONCURRENCY = 4;
  let activeLoads = 0;
  const queue = [];

  // helper: construct raw.githubusercontent fallback for a jsDelivr URL or filename
  function rawFallback(url) {
    try {
      // try to extract filename
      const parts = url.split('/');
      const fname = parts[parts.length - 1];
      return `https://raw.githubusercontent.com/afterhart/GalleryPhotos/main/${fname}`;
    } catch (e) { return null; }
  }

  // find gallery images
  const galleryImgs = Array.from(document.querySelectorAll('.gallery-item img'));
  if (!galleryImgs.length) return;

  // prepare images: save original urls in dataset.full/dataset.src and replace src with placeholder
  galleryImgs.forEach((img, i) => {
    const orig = img.getAttribute('src') || '';
    // if already set up, skip
    if (img.dataset._lazyInit) return;
    img.dataset._lazyInit = '1';
    img.dataset.src = orig;
    img.dataset.full = img.dataset.full || orig; // preserve if already had data-full
    // set attributes to improve rendering behaviour
    img.decoding = 'async';
    img.loading = 'lazy';
    // put tiny placeholder to avoid huge immediate download
    img.src = PLACEHOLDER;
    // ensure data-index exists (lightbox uses it)
    if (typeof img.dataset.index === 'undefined') img.dataset.index = i;
  });

  // Load function with retry to fallback
  function loadImageWithFallback(img) {
    if (!img || img.dataset._loaded) return;
    const primary = img.dataset.src;
    const fallback = rawFallback(primary);
    let attempts = [primary];
    if (fallback && fallback !== primary) attempts.push(fallback);

    function tryNext() {
      if (!attempts.length) {
        // failed all
        img.dataset._loaded = 'error';
        img.classList.add('gallery-img-error');
        img.src = PLACEHOLDER;
        return;
      }
      const url = attempts.shift();
      activeLoads++;
      // Temporarily assign; will be replaced on error
      img.src = url;
      // attach handlers
      const onLoad = () => {
        cleanup();
        img.dataset._loaded = 'ok';
      };
      const onError = () => {
        cleanup();
        // try next fallback
        tryNext();
      };
      function cleanup() {
        activeLoads--;
        img.removeEventListener('load', onLoad);
        img.removeEventListener('error', onError);
        processQueue(); // continue queued loads
      }
      img.addEventListener('load', onLoad, { once: true });
      img.addEventListener('error', onError, { once: true });
    }

    tryNext();
  }

  function enqueue(img) {
    queue.push(img);
    processQueue();
  }

  function processQueue() {
    while (activeLoads < MAX_CONCURRENCY && queue.length) {
      const item = queue.shift();
      loadImageWithFallback(item);
    }
  }

  // IntersectionObserver to trigger loading when near viewport
  const io = new IntersectionObserver((entries) => {
    entries.forEach(ent => {
      if (ent.isIntersecting) {
        const img = ent.target;
        io.unobserve(img);
        enqueue(img);
      }
    });
  }, {
    rootMargin: '400px 0px 400px 0px',
    threshold: 0.01
  });

  galleryImgs.forEach(img => {
    io.observe(img);
  });

  // Optional: after idle, load remaining images progressively (to prefetch)
  if ('requestIdleCallback' in window) {
    requestIdleCallback(() => {
      galleryImgs.forEach(img => {
        if (!img.dataset._loaded && !img.dataset._queued) {
          img.dataset._queued = '1';
          enqueue(img);
        }
      });
    }, { timeout: 3000 });
  } else {
    // fallback: small timeout
    setTimeout(() => {
      galleryImgs.forEach(img => {
        if (!img.dataset._loaded && !img.dataset._queued) {
          img.dataset._queued = '1';
          enqueue(img);
        }
      });
    }, 4000);
  }

  // expose a helper to refresh the lightbox images array later if needed
  window.__refreshGalleryImages = function () {
    // if your lightbox code computes images array from DOM at startup, call this after page scripts run:
    return Array.from(document.querySelectorAll('.gallery-item img')).map(img => img.dataset.full || img.dataset.src || img.src);
  };

  // optional: log failed loads to console (useful for debugging)
  galleryImgs.forEach(img => {
    img.addEventListener('error', () => {
      console.warn('Gallery image failed to load:', img.dataset.src || img.src);
    });
  });

})();
</script>
<script>
(function () {
  // --- NAV SCROLL / ACTIVE (оставляем вашу логику) ---
  const links = Array.from(document.querySelectorAll('.nav a[data-page]'));
  const setActive = (page) => {
    links.forEach(a => {
      const isActive = a.dataset.page === page;
      a.classList.toggle('active', isActive);
      if (isActive) a.setAttribute('aria-current', 'page'); else a.removeAttribute('aria-current');
    });
  };
  const mapPathToPage = (p) => {
    if (!p || p === '/' || p === '/index.html') return 'main';
    const name = p.split('/').pop().toLowerCase();
    if (name === 'index.html' || name === '') return 'main';
    return name.replace('.html', '');
  };
  setActive(mapPathToPage(window.location.pathname));

  // === Robust gallery + lightbox handler (replace previous gallery/lightbox chunk) ===
(function () {
  const galleryGrid = document.querySelector('.gallery-grid');
  const lightbox = document.getElementById('lightbox');
  if (!galleryGrid || !lightbox) return;

  const lbImage = lightbox.querySelector('.lb-image');
  const lbCaption = lightbox.querySelector('.lb-caption');
  const lbClose = lightbox.querySelector('.lb-close');
  const lbPrev = lightbox.querySelector('.lb-prev');
  const lbNext = lightbox.querySelector('.lb-next');

  const PLACEHOLDER_FULL = 'data:image/svg+xml;charset=utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="90"></svg>';
  let currentIndex = -1;

  // helpers to read current DOM state (works with lazy-loader)
  const getItems = () => Array.from(document.querySelectorAll('.gallery-item img'));
  const getSrcForIndex = (i) => {
    const imgs = getItems();
    const img = imgs[i];
    return img ? (img.dataset.full || img.dataset.src || img.src) : null;
  };

  // open lightbox at index (safe)
  function openAt(index) {
    try {
      const imgs = getItems();
      if (!imgs.length) return;
      if (index < 0 || index >= imgs.length) return;
      currentIndex = index;

      const src = imgs[currentIndex].dataset.full || imgs[currentIndex].dataset.src || imgs[currentIndex].src;
      if (!lbImage) return;

      // reset and show
      lbImage.src = ''; // reset previous
      lbImage.alt = imgs[currentIndex].alt || '';
      lbCaption.textContent = imgs[currentIndex].alt || '';

      // show overlay early (so user sees UI while image loads)
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.documentElement.style.overflow = 'hidden';

      // set src (will trigger load/error)
      lbImage.src = src || PLACEHOLDER_FULL;

      // preload neighbors
      preloadIndex(currentIndex - 1);
      preloadIndex(currentIndex + 1);
    } catch (err) {
      console.error('openAt error', err);
      // ensure we don't leave page unusable
      try { lightbox.classList.remove('open'); document.documentElement.style.overflow = ''; } catch(e){}
    }
  }

  function close() {
    try {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.documentElement.style.overflow = '';
      if (lbImage) lbImage.src = '';
      currentIndex = -1;
    } catch (err) { console.error('close error', err); }
  }

  function showPrev() {
    const imgs = getItems();
    if (!imgs.length) return;
    openAt((currentIndex - 1 + imgs.length) % imgs.length);
  }
  function showNext() {
    const imgs = getItems();
    if (!imgs.length) return;
    openAt((currentIndex + 1) % imgs.length);
  }

  function preloadIndex(i) {
    const url = getSrcForIndex(i);
    if (!url) return;
    const im = new Image();
    im.src = url;
  }

  // click thumbnails using event delegation (works for dynamic DOM)
  galleryGrid.addEventListener('click', (ev) => {
    const img = ev.target && ev.target.closest && ev.target.closest('img');
    if (!img) return;
    // find index from current DOM items (robust)
    const imgs = getItems();
    const idx = imgs.indexOf(img);
    if (idx === -1) return;
    ev.preventDefault();
    openAt(idx);
  });

  // controls
  lbClose.addEventListener('click', close);
  lbPrev.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
  lbNext.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

  // click outside image closes
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) close();
  });

  // keyboard nav
  document.addEventListener('keydown', (e) => {
    if (lightbox.classList.contains('open')) {
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') showPrev();
      else if (e.key === 'ArrowRight') showNext();
    }
  });

  // touch swipe for lbImage area
  let touchStartX = 0;
  let touchEndX = 0;
  if (lbImage) {
    lbImage.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
    lbImage.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const dx = touchEndX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx > 0) showPrev(); else showNext();
      }
    }, {passive:true});
  }

  // handle image load/error inside lightbox to avoid crashes
  if (lbImage) {
    lbImage.addEventListener('error', () => {
      console.warn('Lightbox image failed to load:', lbImage.src);
      // show placeholder and keep lightbox open so user can navigate away
      lbImage.src = PLACEHOLDER_FULL;
    });
    // optional: add a small fade-in when loaded
    lbImage.addEventListener('load', () => {
      lbImage.style.opacity = '1';
    });
    lbImage.style.transition = 'opacity .18s ease';
    lbImage.style.opacity = '0';
  }

  // expose for debugging
  window.__openGalleryAt = openAt;
  window.__closeGallery = close;
})();

  // prevent underlying page scroll while lightbox open on mobile
  lightbox.addEventListener('touchmove', (e) => {
    if (lightbox.classList.contains('open')) e.preventDefault();
  }, { passive: false });

  // --- SCROLL TO CATALOG / MAIN logic kept (from previous) ---
  const hero = document.querySelector('.hero');
  const gridCatalog = document.querySelector('.grid');
  if (hero && gridCatalog) {
    const waitForGridImages = () => {
      const imgs = Array.from(gridCatalog.querySelectorAll('img'));
      const promises = imgs.map(img => img.complete ? Promise.resolve() : new Promise(resolve => {
        img.addEventListener('load', resolve, { once: true });
        img.addEventListener('error', resolve, { once: true });
      }));
      return Promise.all(promises);
    };

    const EPS = 3;
    let gridItems = Array.from(gridCatalog.querySelectorAll('.item'));
    let firstRowItems = [];

    const updateFirstRowItems = () => {
      gridItems = Array.from(gridCatalog.querySelectorAll('.item'));
      if (!gridItems.length) { firstRowItems = []; return; }
      const rects = gridItems.map(it => it.getBoundingClientRect());
      const tops = rects.map(r => r.top);
      const minTop = Math.min(...tops);
      firstRowItems = gridItems.filter((it, i) => Math.abs(rects[i].top - minTop) <= EPS);
    };

    const vh = () => window.innerHeight || document.documentElement.clientHeight;
    const isElementFullyVisible = (el) => {
      const r = el.getBoundingClientRect();
      return r.top >= 0 && r.bottom <= vh();
    };
    const isFirstRowFullyVisible = () => {
      if (!firstRowItems.length) return false;
      const rects = firstRowItems.map(el => el.getBoundingClientRect());
      const top = Math.min(...rects.map(r => r.top));
      const bottom = Math.max(...rects.map(r => r.bottom));
      return top >= 0 && bottom <= vh();
    };
    const isFirstRowAnyVisible = () => {
      if (!firstRowItems.length) return false;
      const rects = firstRowItems.map(el => el.getBoundingClientRect());
      const top = Math.min(...rects.map(r => r.top));
      const bottom = Math.max(...rects.map(r => r.bottom));
      return !(bottom <= 0 || top >= vh());
    };
    const getFirstRowFirstElement = () => firstRowItems[0] || null;
    const scrollToTopSmooth = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    const scrollToElementSmooth = (el) => { if (!el) return; el.scrollIntoView({ behavior: 'smooth', block: 'start' }); };

    // override nav clicks to scroll on same page
    links.forEach(a => {
      a.addEventListener('click', (ev) => {
        const page = a.dataset.page;
        if (page === 'main') {
          ev.preventDefault();
          setActive('main');
          scrollToTopSmooth();
          try { history.pushState(null, '', 'index.html'); } catch (e) {}
        } else if (page === 'catalog') {
          ev.preventDefault();
          updateFirstRowItems();
          const first = getFirstRowFirstElement();
          const target = first || document.querySelector('.catalog');
          setActive('catalog');
          scrollToElementSmooth(target);
          try { history.pushState(null, '', 'index.html#catalog'); } catch (e) {}
        }
      });
    });

    waitForGridImages().then(() => {
      updateFirstRowItems();
      requestAnimationFrame(() => {
        if (isFirstRowFullyVisible()) setActive('catalog');
        else if (!isFirstRowAnyVisible()) setActive('main');
        else if (isElementFullyVisible(hero)) setActive('main');
      });
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => updateFirstRowItems(), 120);
    });

    let ticking = false;
    const onScroll = () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          if (isFirstRowFullyVisible()) setActive('catalog');
          else if (!isFirstRowAnyVisible()) setActive('main');
          else if (isElementFullyVisible(hero)) setActive('main');
          ticking = false;
        });
        ticking = true;
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
  }
})();

<script>
/* Temporary: disable lightbox and make gallery non-clickable; show nice placeholders */
(function () {
  // 1) Hide lightbox UI (so it cannot be triggered or visible)
  const lb = document.getElementById('lightbox');
  if (lb) {
    lb.style.display = 'none';
    lb.setAttribute('aria-hidden', 'true');
  }

  // 2) Block click events reaching any existing gallery handlers by stopping propagation at capture phase
  const grid = document.querySelector('.gallery-grid');
  if (grid) {
    grid.addEventListener('click', function (ev) {
      // prevent clicks from reaching older handlers
      ev.stopPropagation();
      ev.preventDefault();
    }, true); // capture = true
  }

  // 3) Make sure images are not clickable (extra safety)
  document.querySelectorAll('.gallery-item img').forEach(img => {
    img.style.pointerEvents = 'none';
    img.style.cursor = 'default';
  });

  // 4) Visual: add loaded/error classes based on native load/error events
  document.querySelectorAll('.gallery-item img').forEach(img => {
    // If image already loaded (browser cache), mark as loaded
    if (img.complete && img.naturalWidth && img.naturalHeight) {
      img.classList.add('loaded');
      return;
    }
    // Normal handlers
    img.addEventListener('load', () => {
      img.classList.add('loaded');
    }, { once: true });
    img.addEventListener('error', () => {
      const parent = img.closest('.gallery-item');
      if (parent) parent.classList.add('error');
      // leave placeholder background from CSS
    }, { once: true });
  });

  // 5) Optional: if you had a lazy-loader replacing srcs with placeholders,
  // ensure that when the real src is set the load event still fires and triggers .loaded.
  // (Above handlers cover that.)

  // 6) Additional safety: remove keyboard handlers for lightbox if they exist on window (best-effort)
  try {
    // This is non-destructive: only removes handlers if they are stored in known names
    if (window.__closeGallery) {
      window.__closeGallery = function(){};
    }
  } catch (e) { /* ignore */ }

})();
</script>
