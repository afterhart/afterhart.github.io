<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="styles.css" />

<body>


  <aside class="sidebar" aria-label="Primary">

  <main id="main" class="main" role="main" tabindex="-1">

            <p>KETA JACKET</p>

        <article class="item">
          <a href="look4.html">
            <img src="look4.jpg" alt="RUST BELT" loading="lazy" />
            <p>RUST BELT</p>

         <article class="item">
          <a href="look5.html">
            <img src="look5.jpg" alt="LEATHER SKIRT" loading="lazy" />

    <!-- Gallery placed directly after the catalog — uses the same .grid/.item markup -->
<section class="gallery" aria-label="Gallery">
  <div class="grid">
    <article class="item">
      <a href="gallery1.html">
        <img src="gallery1.jpg" alt="Gallery 1" loading="lazy" />
        <p>GALLERY 1</p>
      </a>
    </article>
    <article class="item">
      <a href="gallery2.html">
        <img src="gallery2.jpg" alt="Gallery 2" loading="lazy" />
        <p>GALLERY 2</p>
      </a>
    </article>

    <!-- Добавляй новые элементы по тому же шаблону -->
  </div>
</section>
  </main>

<script>
// nav-scroll.js
// Replaces the previous nav/highlight script with direction-aware main activation.
// - Main becomes active when intro2/intro3 > 50% OR hero (intro1) passes a threshold.
// - When scrolling down hero threshold = 50% (strict) to avoid spurious activation.
// - When scrolling up hero threshold = 2% (lenient) so returning to top re-activates Main quickly.
// - Keeps Catalog/Gallery rules, smooth scroll on nav clicks, and mutation/resize handling.
//

(function () {
  'use strict';

  const ROW_EPS = 6; // px tolerance to group items into a row

  // nav links
  const links = Array.from(document.querySelectorAll('.nav a[data-page]'));
  function setActive(page) {
    links.forEach(a => {
      const isActive = a.dataset.page === page;
      a.classList.toggle('active', isActive);
      if (isActive) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  }

  // DOM references (may be null if section absent)
  const hero = document.querySelector('.hero'); // intro1
  const heroPair = document.querySelector('.hero-pair'); // intro2/intro3 wrapper
  const introVideos = heroPair ? Array.from(heroPair.querySelectorAll('.hero-vertical')) : [];
  const catalogGrid = document.querySelector('.catalog .grid') || document.querySelector('.grid');
  const galleryGrid = document.querySelector('.gallery .grid') || document.querySelector('.gallery-grid');

  function rect(el) { return el.getBoundingClientRect(); }
  function vh() { return window.innerHeight || document.documentElement.clientHeight; }

  // fraction of element visible in viewport [0..1]
  function visibleFraction(el) {
    if (!el) return 0;
    const r = rect(el);
    const overlap = Math.max(0, Math.min(r.bottom, vh()) - Math.max(r.top, 0));
    if (r.height <= 0) return 0;
    return Math.min(1, overlap / r.height);
  }

  // group items into rows by top coordinate (returns array of rows, each row is array of elements)
  function rowsFromItems(items) {
    if (!items || !items.length) return [];
    const list = items.map(it => ({ el: it, top: Math.round(rect(it).top) }));
    list.sort((a,b) => a.top - b.top);
    const rows = [];
    list.forEach(r => {
      if (!rows.length) rows.push([r.el]);
      else {
        const lastTop = Math.round(rect(rows[rows.length - 1][0]).top);
        if (Math.abs(r.top - lastTop) <= ROW_EPS) rows[rows.length - 1].push(r.el);
        else rows.push([r.el]);
      }
    });
    return rows;
  }

  function allFullyVisible(elements) {
    if (!elements || !elements.length) return false;
    return elements.every(el => visibleFraction(el) >= 0.999);
  }
  function avgVisible(elements) {
    if (!elements || !elements.length) return 0;
    return elements.reduce((s, el) => s + visibleFraction(el), 0) / elements.length;
  }

  function getCatalogRows() {
    if (!catalogGrid) return [];
    const items = Array.from(catalogGrid.querySelectorAll('.item'));
    return rowsFromItems(items);
  }
  function getGalleryRows() {
    if (!galleryGrid) return [];
    const items = Array.from(galleryGrid.querySelectorAll('.gallery-item, .item'));
    return rowsFromItems(items);
  }

  // scroll direction tracking
  let lastScrollY = (window.pageYOffset || 0);

  function decideActive() {
    const heroFrac = hero ? visibleFraction(hero) : 0;
    const introFracs = introVideos.length ? introVideos.map(v => visibleFraction(v)) : [];
    const maxIntroFrac = introFracs.length ? Math.max(...introFracs) : 0;

    const catalogRows = getCatalogRows();
    const galleryRows = getGalleryRows();

    const firstCatalogRow = catalogRows.length ? catalogRows[0] : [];
    const lastCatalogRow = catalogRows.length ? catalogRows[catalogRows.length - 1] : [];
    const firstGalleryRow = galleryRows.length ? galleryRows[0] : [];

    const avgFirstCatalog = avgVisible(firstCatalogRow);
    const avgFirstGallery = avgVisible(firstGalleryRow);

    const firstGalleryFully = firstGalleryRow.length ? allFullyVisible(firstGalleryRow) : false;
    const lastCatalogFully = lastCatalogRow.length ? allFullyVisible(lastCatalogRow) : false;

    const currentY = window.pageYOffset || 0;
    const direction = currentY > lastScrollY ? 'down' : (currentY < lastScrollY ? 'up' : 'none');
    lastScrollY = currentY;

    // direction-aware threshold for hero (intro1):
    // - when scrolling down be strict (require 50%)
    // - when scrolling up be lenient (2%) so returning to top highlights main quickly
    const heroThreshold = (direction === 'up') ? 0.02 : 0.5;

    // 1) MAIN: if intro2/3 >50% OR hero visible above threshold => main
    if (maxIntroFrac > 0.5 || heroFrac > heroThreshold) {
      setActive('main');
      return;
    }

    // 2) GALLERY: if first gallery row >50% visible OR fully visible => gallery
    if (firstGalleryRow.length && avgFirstGallery > 0.5) {
      setActive('gallery');
      return;
    }
    if (firstGalleryFully) {
      setActive('gallery');
      return;
    }

    // 3) CATALOG: if more than half of first catalog row is visible => catalog
    if (firstCatalogRow.length && avgFirstCatalog > 0.5) {
      setActive('catalog');
      return;
    }

    // 4) Scrolling up: if last catalog row fully visible => catalog
    if (direction === 'up' && lastCatalogFully) {
      setActive('catalog');
      return;
    }

    // Fallback: default to main
    setActive('main');
  }

  // helpers to wait for images in container (so rows are measured correctly)
  function waitForImagesWithin(container, timeout = 1000) {
    if (!container) return Promise.resolve();
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length) return Promise.resolve();
    const promises = imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => {
      img.addEventListener('load', res, { once: true });
      img.addEventListener('error', res, { once: true });
    }));
    return Promise.race([Promise.all(promises), new Promise(res => setTimeout(res, timeout))]);
  }

  // helpers to pick scroll targets
  function firstElementOfFirstCatalogRow() {
    const rows = getCatalogRows();
    if (!rows.length || !rows[0].length) return null;
    return rows[0][0];
  }
  function firstElementOfFirstGalleryRow() {
    const rows = getGalleryRows();
    if (!rows.length || !rows[0].length) return null;
    return rows[0][0];
  }

  // smooth scroll helpers
  function scrollToTopSmooth() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToElementSmooth(el) {
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // bind clicks for nav items (prevent default navigation and perform smooth scroll)
  function bindNavClicks() {
    links.forEach(a => {
      a.addEventListener('click', function (ev) {
        const page = a.dataset.page;
        if (page === 'main') {
          ev.preventDefault();
          setActive('main');
          scrollToTopSmooth();
          try { history.pushState(null, '', 'index.html'); } catch (e) {}
          setTimeout(decideActive, 420);
        } else if (page === 'catalog') {
          ev.preventDefault();
          setTimeout(() => {
            const target = firstElementOfFirstCatalogRow() || document.querySelector('.catalog') || document.querySelector('.grid');
            if (target) {
              setActive('catalog');
              scrollToElementSmooth(target);
              try { history.pushState(null, '', 'index.html#catalog'); } catch (e) {}
              setTimeout(decideActive, 420);
            }
          }, 30);
        } else if (page === 'gallery') {
          ev.preventDefault();
          setTimeout(() => {
            const target = firstElementOfFirstGalleryRow() || document.querySelector('.gallery') || document.querySelector('.gallery-grid');
            if (target) {
              setActive('gallery');
              scrollToElementSmooth(target);
              try { history.pushState(null, '', 'index.html#gallery'); } catch (e) {}
              setTimeout(decideActive, 420);
            }
          }, 30);
        } else {
          // allow normal navigation for other links
        }
      });
    });
  }

  // init: wait for images then bind handlers
  function initAndBind() {
    const containers = [catalogGrid, galleryGrid, hero, heroPair].filter(Boolean);
    const waiters = containers.map(c => waitForImagesWithin(c));
    Promise.all(waiters).then(() => {
      requestAnimationFrame(decideActive);
      setTimeout(decideActive, 120);
    });

    bindNavClicks();

    let rafId = null;
    const onScroll = () => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(decideActive);
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    window.addEventListener('resize', () => {
      clearTimeout(window.__catalogResizeTimer);
      window.__catalogResizeTimer = setTimeout(decideActive, 180);
    });

    const observerTarget = catalogGrid || galleryGrid;
    if (observerTarget) {
      const mo = new MutationObserver(() => { setTimeout(decideActive, 80); });
      mo.observe(observerTarget, { childList: true, subtree: true });
    }
  }

  // set initial active based on URL
  function mapPathToPage(p) {
    if (!p || p === '/' || p === '/index.html') return 'main';
    const name = p.split('/').pop().toLowerCase();
    if (name === 'index.html' || name === '') return 'main';
    if (name.startsWith('index.html#')) {
      if (name.includes('#catalog')) return 'catalog';
      if (name.includes('#gallery')) return 'gallery';
    }
    return name.replace('.html', '');
  }
  setActive(mapPathToPage(window.location.pathname + (window.location.hash || '')));

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    initAndBind();
  } else {
    window.addEventListener('DOMContentLoaded', initAndBind, { once: true });
  }

  // expose for debugging
  window.__decideNavActive = decideActive;

})();
</script>
</body>
</html>
