<script>
// nav-fix.js
// Надёжно блокирует обычную навигацию ссылок в .nav и реализует только внутреннюю плавную прокрутку.
// Заменяет поведение: при клике по Main -> scrollTop, Catalog -> первая строка каталога, Gallery -> первая строка галереи.
// Защищает от двойного срабатывания и работает независимо от порядка загрузки других скриптов.

(function () {
  'use strict';

  // Удобные селекторы / элементы
  const navRootSelector = '.nav';
  const navLinkSelector = '.nav a';
  const catalogGridSelector = '.catalog .grid, .grid';
  const galleryGridSelector = '.gallery .grid, .gallery-grid';

  // Простая функция переключения классов active/aria-current
  function setActiveNav(page) {
    const links = Array.from(document.querySelectorAll(navLinkSelector));
    links.forEach(a => {
      const isActive = a.dataset && a.dataset.page === page;
      a.classList.toggle('active', !!isActive);
      if (isActive) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  }

  // Возвращает первую ноду первой строки для переданного grid-конт��йнера
  function firstElementOfFirstRow(gridEl) {
    if (!gridEl) return null;
    // items могут быть .item или .gallery-item
    const items = Array.from(gridEl.querySelectorAll('.item, .gallery-item'));
    if (!items.length) return null;
    // Группируем по top и берем первую группу
    const list = items.map(it => ({ el: it, top: Math.round(it.getBoundingClientRect().top) }));
    list.sort((a,b) => a.top - b.top);
    const firstTop = list[0].top;
    const firstRow = list.filter(x => Math.abs(x.top - firstTop) <= 6).map(x => x.el);
    return firstRow.length ? firstRow[0] : list[0].el;
  }

  // Smooth scroll helpers
  function scrollToTopSmooth() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToElementSmooth(el) {
    if (!el) return;
    // Если у вас фиксированный sidebar высотой H, можно вычитать offset
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Основная обработка клика по навигации
  function onNavClick(e) {
    // перехватываем любые клики на .nav a (включая с модификаторами) — предотвращаем переход
    e.preventDefault();
    e.stopPropagation();

    const a = e.currentTarget || e.target;
    if (!a) return;

    const page = (a.dataset && a.dataset.page) ? a.dataset.page : null;

    if (page === 'main') {
      setActiveNav('main');
      scrollToTopSmooth();
      try { history.pushState(null, '', 'index.html'); } catch (err) {}
      // Re-evaluate nav state after scroll settles
      setTimeout(() => { if (window.__decideNavActive) window.__decideNavActive(); }, 450);
      return;
    }

    if (page === 'catalog') {
      setActiveNav('catalog');
      // Найдём первую ноду первой строки каталога и прокрутим к ней
      const catalogGrid = document.querySelector(catalogGridSelector);
      const target = firstElementOfFirstRow(catalogGrid) || document.querySelector('.catalog') || document.querySelector('.grid');
      if (target) scrollToElementSmooth(target);
      try { history.pushState(null, '', 'index.html#catalog'); } catch (err) {}
      setTimeout(() => { if (window.__decideNavActive) window.__decideNavActive(); }, 450);
      return;
    }

    if (page === 'gallery') {
      setActiveNav('gallery');
      const galleryGrid = document.querySelector(galleryGridSelector);
      const target = firstElementOfFirstRow(galleryGrid) || document.querySelector('.gallery') || document.querySelector('.gallery-grid');
      if (target) scrollToElementSmooth(target);
      try { history.pushState(null, '', 'index.html#gallery'); } catch (err) {}
      setTimeout(() => { if (window.__decideNavActive) window.__decideNavActive(); }, 450);
      return;
    }

    // Если ссылка непонятная — просто блокируем переход (по твоему запросу не переходим)
    // Можно добавить поведение по умолчанию, если захочешь.
    return;
  }

  // Навешиваем обработчики на все элементы .nav a (и делаем это в capture, чтобы перехватить раньше других)
  function bindNavHandlers() {
    const links = Array.from(document.querySelectorAll(navLinkSelector));
    if (!links.length) return;
    links.forEach(a => {
      // удаляем старые привязки, если были
      a.removeEventListener('click', onNavClick, true);
      a.addEventListener('click', onNavClick, true); // use capture true to be robust
      // на всякий случай: убираем target чтобы не открывалось в новом окне
      try { a.removeAttribute('target'); } catch (e) {}
    });
  }

  // Инициализация: ждём DOMContentLoaded чтобы гарантированно найти ссылки
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bindNavHandlers, { once: true });
  } else {
    bindNavHandlers();
  }

  // Также наблюдаем за динамическими изменениями nav (вдруг заменяют ссылки)
  const navRoot = document.querySelector(navRootSelector);
  if (navRoot) {
    const mo = new MutationObserver(() => { bindNavHandlers(); });
    mo.observe(navRoot, { childList: true, subtree: true });
  }

  // expose small helper to rebind if needed from console
  window.__bindNavHandlers = bindNavHandlers;
})();
</skript>
